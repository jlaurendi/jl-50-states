<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>50 States Marathon Journey — Joe Laurendi</title>
  <meta name="description" content="Tracking Joe's marathon journey across all 50 states. An interactive map celebrating every race and every story.">
  <meta name="theme-color" content="#0f172a">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Libraries (loaded as globals for reliability) -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header fade-in-section">
      <h1 class="header-title">50 States Marathon Journey</h1>
      <p class="header-subtitle">Racing across America, one state at a time</p>
    </header>

    <!-- Progress -->
    <section class="progress-section fade-in-section" aria-label="Marathon progress">
      <div class="progress-counter">
        <span id="state-counter">0</span>
        <span class="counter-total"> / 50</span>
      </div>
      <p class="progress-label" id="progress-label">Loading…</p>
      <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="50">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </section>

    <!-- Error Banner -->
    <div class="error-banner" id="error-banner" hidden role="alert"></div>

    <!-- Map -->
    <section class="map-section fade-in-section" aria-label="Interactive US map">
      <div class="map-wrapper">
        <div id="map-container"></div>
      </div>
      <div class="legend">
        <div class="legend-item">
          <span class="legend-dot completed"></span>
          Completed
        </div>
        <div class="legend-item">
          <span class="legend-dot planned"></span>
          Planned
        </div>
        <div class="legend-item">
          <span class="legend-dot remaining"></span>
          Remaining
        </div>
      </div>
    </section>

    <!-- Stats -->
    <section class="stats-section fade-in-section" aria-label="Marathon statistics">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value accent" id="stat-completed">—</div>
          <div class="stat-label">States Completed</div>
        </div>
        <div class="stat-card">
          <div class="stat-value pr" id="stat-pr">—</div>
          <div class="stat-label">Marathon PR</div>
          <div class="stat-sublabel" id="stat-pr-race"></div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-years">—</div>
          <div class="stat-label">Years Racing</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-recent">—</div>
          <div class="stat-label">Most Recent</div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>Built with D3.js • Data from Google Sheets</p>
    </footer>

  </div>

  <!-- App entry -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
